name: Update data caches

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data-caches
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update match and rating caches
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION }}
          FOOTBALL_DATA_SEASON: ${{ vars.FOOTBALL_DATA_SEASON }}
          TEAM_RATINGS_SOURCE_URL: ${{ secrets.TEAM_RATINGS_SOURCE_URL }}
        run: node scripts/update-real-data.mjs

      - name: Update market odds cache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_SPORT: ${{ vars.ODDS_API_SPORT }}
          ODDS_API_REGIONS: ${{ vars.ODDS_API_REGIONS }}
          ODDS_API_BOOKMAKERS: ${{ vars.ODDS_API_BOOKMAKERS }}
          MARKET_ODDS_SOURCE_URL: ${{ secrets.MARKET_ODDS_SOURCE_URL }}
          MARKET_ODDS_BEARER_TOKEN: ${{ secrets.MARKET_ODDS_BEARER_TOKEN }}
        run: node scripts/update-market-odds.mjs

      - name: Check site data
        run: node scripts/check-site.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update data caches"
          file_pattern: data/matches.json data/team-ratings.json data/model-inputs.json data/market-odds.json
