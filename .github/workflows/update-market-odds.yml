name: Update market odds

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update market odds cache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_SPORT: ${{ vars.ODDS_API_SPORT }}
          ODDS_API_REGIONS: ${{ vars.ODDS_API_REGIONS }}
          ODDS_API_BOOKMAKERS: ${{ vars.ODDS_API_BOOKMAKERS }}
          MARKET_ODDS_SOURCE_URL: ${{ secrets.MARKET_ODDS_SOURCE_URL }}
          MARKET_ODDS_BEARER_TOKEN: ${{ secrets.MARKET_ODDS_BEARER_TOKEN }}
        run: node scripts/update-market-odds.mjs

      - name: Commit updated odds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market odds cache"
          file_pattern: data/market-odds.json
